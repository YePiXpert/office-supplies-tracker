name: Bump Version And Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      release_tag: ${{ steps.release.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          python scripts/bump_version.py --bump patch
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Compute release tag
        id: release
        run: |
          echo "tag=v${{ steps.bump.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add VERSION main.py static/state.js static/index.html installer.iss installer/OfficeSuppliesTracker.iss README.md USAGE.md
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip ci]"
          git tag "${{ steps.release.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.release.outputs.tag }}"

  build-windows-release:
    needs: bump-version
    uses: ./.github/workflows/build-windows-exe.yml
    with:
      release_tag: ${{ needs.bump-version.outputs.release_tag }}
    secrets: inherit
